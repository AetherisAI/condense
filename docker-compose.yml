# Sift — dev/PoC topology (README §9). One instance on the strong host, reached over LAN.
#
# Inference that is NOT containerized here:
#   - Ollama serving bge-m3 runs on the HOST (Metal) and is reached by URL (EMBED_BASE_URL).
#   - Turso / libSQL is cloud or an embedded-replica file — no container.
#
# Hard rule (README §9): private LAN + bearer token only. Bind to the LAN interface and
# never port-forward to the public internet.
#
# Skeleton only: the api/ and web/ Dockerfiles are added later by Dev A/B.

services:
  api:
    build:
      context: .
      dockerfile: api.Dockerfile # added later (Dev B)
    environment:
      STORE_BACKEND: ${STORE_BACKEND:-libsql}
      TURSO_DATABASE_URL: ${TURSO_DATABASE_URL:-}
      TURSO_AUTH_TOKEN: ${TURSO_AUTH_TOKEN:-}
      EMBED_BASE_URL: ${EMBED_BASE_URL:-} # host Ollama, e.g. http://host.docker.internal:11434/v1
      EMBED_MODEL: ${EMBED_MODEL:-bge-m3}
      EMBED_API_KEY: ${EMBED_API_KEY:-}
      RERANK_STRATEGY: ${RERANK_STRATEGY:-llm}
      RERANK_BASE_URL: ${RERANK_BASE_URL:-http://tei:80}
      RERANK_MODEL: ${RERANK_MODEL:-bge-reranker-v2-m3}
      RETRIEVE_K: ${RETRIEVE_K:-30}
      FINAL_K: ${FINAL_K:-1}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      CHUNK_SIZE: ${CHUNK_SIZE:-512}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-64}
      INGEST_TOKEN: ${INGEST_TOKEN:?set a shared bearer token in .env}
      API_BIND: ${API_BIND:-0.0.0.0}
    ports:
      - "${API_PORT:-8000}:8000"
    # No hard dependency on tei: the default PoC path is RERANK_STRATEGY=llm (D4,
    # zero-infra). Start the cross-encoder only with `--profile tei` (see tei below).

  web:
    build:
      context: ./web # added later (Dev B): Vite dev server, or built UI behind nginx
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api

  tei:
    # Cross-encoder reranker (README §7): bge-reranker-v2-m3 via Text Embeddings Inference.
    # Opt-in only — gated behind the `tei` profile so the default `docker compose up` runs
    # the zero-infra llm-judge path and never pulls the reranker model. Enable with
    # `docker compose --profile tei up` + RERANK_STRATEGY=crossencoder. Port 8081 to leave
    # 8080 for Dev B's web/nginx.
    profiles: ["tei"]
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    command: ["--model-id", "${RERANK_HF_MODEL:-BAAI/bge-reranker-v2-m3}"]
    ports:
      - "${TEI_PORT:-8081}:80"

  # Optional local LLM for recap. Alternatively point LLM_BASE_URL at host Ollama.
  # local-llm:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11435:11434"
