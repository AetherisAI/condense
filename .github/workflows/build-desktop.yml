name: build-desktop

# Builds two things per OS for the desktop-standalone WP (docs/Quentin/DECISIONS.md D60-D64):
#   1. `server-bundle` — the separable "API only" download: PyInstaller engine (onedir) +
#      sift-agent-cli, packaged with packaging/server-bundle/'s static files. This is the SAME
#      artifact the Tauri app's first-run provisioning manifest downloads (D63) — its filename is
#      a contract, not cosmetic.
#   2. `desktop` — the Tauri 2 installer (deb+AppImage / dmg / nsis), with the agent CLI frozen as
#      its externalBin sidecar.
# PyInstaller can't cross-compile (same constraint as build-agent.yml), so both jobs run natively
# on each OS via a matrix rather than cross-building from Linux.
on:
  workflow_dispatch:
  push:
    # TEMPORARY until merge — remove this branch trigger once feat/desktop-standalone lands on
    # main; it exists only so the overnight WP gets CI signal before the PR does.
    branches: [feat/desktop-standalone]
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server-bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
          - os: macos-latest
            triple: aarch64-apple-darwin
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    defaults:
      run:
        # Windows runners ship Git Bash; using it uniformly lets every step below (except the
        # two archive steps, which genuinely need OS-native tools) stay OS-agnostic.
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install engine + agent build deps (pyinstaller comes from the `packaging` extra)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[store,parsing,chunking,inference,agent,packaging]'

      - name: Build engine (PyInstaller onedir -> dist/sift-engine/)
        run: pyinstaller packaging/sift-engine.spec --noconfirm --distpath dist --workpath build

      - name: Build agent CLI sidecar (PyInstaller onefile -> dist/sift-agent-cli[.exe])
        run: pyinstaller packaging/sift-agent-cli.spec --noconfirm --distpath dist --workpath build

      - name: Assemble condense-server-${{ matrix.triple }}/
        run: |
          set -euo pipefail
          bundle="condense-server-${{ matrix.triple }}"
          rm -rf "$bundle"
          mkdir -p "$bundle/engine" "$bundle/bin"

          # engine/ IS the onedir directory's contents (D62/D63 layout contract).
          cp -R dist/sift-engine/. "$bundle/engine/"

          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/sift-agent-cli.exe "$bundle/bin/sift-agent-cli.exe"
          else
            cp dist/sift-agent-cli "$bundle/bin/sift-agent-cli"
            chmod +x "$bundle/bin/sift-agent-cli" "$bundle/engine/sift-engine"
          fi

          # Static server-bundle files (README/run scripts/env template) — owned by the engine
          # track (packaging/server-bundle/); both run.sh and run.bat ship unconditionally as of
          # T1, so no existence guards are needed here.
          cp packaging/server-bundle/README.md packaging/server-bundle/env.example packaging/server-bundle/run.sh packaging/server-bundle/run.bat "$bundle/"
          [ "${{ runner.os }}" != "Windows" ] && chmod +x "$bundle/run.sh"
          true

      - name: Archive (tar.gz — Linux/macOS)
        if: runner.os != 'Windows'
        run: tar -czf "condense-server-${{ matrix.triple }}.tar.gz" "condense-server-${{ matrix.triple }}"

      - name: Archive (zip — Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "condense-server-${{ matrix.triple }}" -DestinationPath "condense-server-${{ matrix.triple }}.zip" -Force

      - name: Archive exists + size
        run: |
          f="condense-server-${{ matrix.triple }}.tar.gz"
          [ "${{ runner.os }}" = "Windows" ] && f="condense-server-${{ matrix.triple }}.zip"
          test -s "$f" || { echo "missing/empty $f"; exit 1; }
          ls -lh "$f"

      - uses: actions/upload-artifact@v4
        with:
          name: condense-server-${{ matrix.triple }}
          # The exact filename (condense-server-<triple>.tar.gz / .zip) is a contract the Tauri
          # app's provisioning manifest depends on (D63) — do not rename.
          path: condense-server-${{ matrix.triple }}.*
          if-no-files-found: error

  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
            bundle_glob: |
              desktop/src-tauri/target/release/bundle/deb/**/*.deb
              desktop/src-tauri/target/release/bundle/appimage/**/*.AppImage
          - os: macos-latest
            triple: aarch64-apple-darwin
            bundle_glob: desktop/src-tauri/target/release/bundle/dmg/**/*.dmg
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
            bundle_glob: desktop/src-tauri/target/release/bundle/nsis/**/*.exe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agent CLI build deps (minimal — no engine/ML stack in the sidecar)
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller httpx watchdog platformdirs

      - name: Build agent CLI sidecar (PyInstaller onefile)
        run: pyinstaller packaging/sift-agent-cli.spec --noconfirm --distpath dist --workpath build

      - name: Rename sidecar to Tauri externalBin convention
        run: |
          set -euo pipefail
          mkdir -p desktop/src-tauri/binaries
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/sift-agent-cli.exe "desktop/src-tauri/binaries/sift-agent-cli-${{ matrix.triple }}.exe"
          else
            cp dist/sift-agent-cli "desktop/src-tauri/binaries/sift-agent-cli-${{ matrix.triple }}"
            chmod +x "desktop/src-tauri/binaries/sift-agent-cli-${{ matrix.triple }}"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            desktop/package-lock.json

      - name: Install Linux Tauri 2 build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libxdo-dev libssl-dev patchelf pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      # v1 is unsigned (no code-signing/notarization secrets configured yet) — installers will
      # show OS "unknown publisher"/Gatekeeper warnings until a future WP adds signing keys.
      # tauri-action is given no tagName/releaseId, so it only builds; it never talks to the
      # GitHub Release API itself — the separate `release` job below (mirroring build-agent.yml)
      # owns publishing so both jobs' assets land on one release page.
      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop

      - name: Bundle exists
        run: |
          set -euo pipefail
          found=0
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            for f in $pattern; do
              [ -e "$f" ] && { found=1; ls -lh "$f"; }
            done
          done <<< "${{ matrix.bundle_glob }}"
          [ "$found" = "1" ] || { echo "no bundle produced for ${{ matrix.triple }}"; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: condense-desktop-${{ matrix.triple }}
          path: ${{ matrix.bundle_glob }}
          if-no-files-found: error

  release:
    # On a v* tag, attach both jobs' outputs to the same GitHub Release — same
    # download/upload-artifact + softprops/action-gh-release pattern as build-agent.yml.
    if: startsWith(github.ref, 'refs/tags/')
    needs: [server-bundle, desktop]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-artifacts/condense-server-*/*
            dist-artifacts/condense-desktop-*/**/*
          fail_on_unmatched_files: true
