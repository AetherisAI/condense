name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    name: Python · lint · types · tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (adapter deps — no running Turso/Ollama/TEI needed)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[store,parsing,chunking,inference,agent,dev]'
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Pyright
        run: pyright
      - name: Pytest
        run: pytest -q

  sast:
    name: SAST · bandit · pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip bandit pip-audit
          pip install -e '.[store,parsing,chunking,inference,agent]'
      - name: Bandit (static security scan — src + agent, medium+ severity/confidence)
        run: bandit -r src agent --severity-level medium --confidence-level medium -q
      - name: pip-audit (dependency CVEs — advisory, does not gate)
        continue-on-error: true
        run: pip-audit --desc

  web:
    name: Web · lint · types · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint (oxlint)
        run: npm run lint
      - name: Typecheck (tsc)
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
