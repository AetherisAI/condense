name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (adapter deps — no running Turso/Ollama/TEI needed)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[store,parsing,chunking,inference,agent,dev]'
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Pyright
        run: pyright
      - name: Pytest
        run: pytest -q
