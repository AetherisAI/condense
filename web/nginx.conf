# Sift web UI nginx config (Dev B). Serves the built Vite SPA and reverse-proxies
# the API surface to the `api` container on the compose network (http://api:8000).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large multipart uploads to POST /ingest (default would be 1m).
    client_max_body_size 100m;

    # Common proxy headers, reused by the API locations below.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- API surface -> FastAPI app (sift.api.main:app) on the compose network.
    # The /ingest prefix also covers GET /ingest/manifest.
    location /search  { proxy_pass http://api:8000; }
    location /ingest  { proxy_pass http://api:8000; }
    location /healthz { proxy_pass http://api:8000; }

    # --- SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
